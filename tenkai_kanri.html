<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>天海の城 管理表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1a2744;--gold:#c8a951;--bg:#f0ede6;--card:#fff;
  --green:#2e7d4f;--red:#c0392b;--orange:#d68910;
  --text:#1a1a1a;--muted:#888;--border:#e0e0e0;
  --radius:14px;--shadow:0 2px 12px rgba(0,0,0,.1)
}
body{font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--text)}
.screen{display:none;min-height:100vh}
.screen.active{display:block}
.home-header{background:var(--navy);padding:52px 20px 28px;text-align:center}
.home-title{color:var(--gold);font-size:30px;font-weight:700;letter-spacing:3px}
.home-sub{color:rgba(255,255,255,.6);font-size:13px;margin-top:5px}
.home-grid{padding:18px 14px 40px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-card{background:var(--card);border-radius:var(--radius);padding:18px 12px 14px;display:flex;flex-direction:column;align-items:center;gap:7px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s;position:relative;min-height:130px;justify-content:center;border:2.5px solid transparent}
.form-card:active{transform:scale(.96)}
.form-card .card-num{position:absolute;top:9px;left:12px;font-size:11px;color:var(--muted);font-weight:700}
.form-card .card-icon{font-size:32px}
.form-card .card-title{font-size:12px;font-weight:600;text-align:center;line-height:1.5;color:var(--text)}
.form-card .card-dot{position:absolute;top:9px;right:10px;width:10px;height:10px;border-radius:50%;background:var(--border)}
.form-card.started .card-dot{background:var(--gold)}
.form-card.started{border-color:var(--gold)}
.form-header{background:var(--navy);padding:52px 14px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:99}
.btn-back{background:rgba(255,255,255,.15);border:none;color:#fff;padding:9px 15px;border-radius:22px;font-size:14px;cursor:pointer;white-space:nowrap;font-family:inherit}
.fh-title{flex:1;color:#fff;font-size:14px;font-weight:700;line-height:1.3}
.btn-print{background:rgba(255,255,255,.15);border:none;color:#fff;padding:9px 13px;border-radius:22px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-clear{background:rgba(200,60,60,.4);border:none;color:#fff;padding:9px 13px;border-radius:22px;font-size:13px;cursor:pointer;font-family:inherit}
.form-body{padding:14px 14px 90px}
.fcard{background:var(--card);border-radius:var(--radius);margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden}
.fcard-head{padding:11px 16px;font-size:12px;font-weight:700;letter-spacing:.5px}
.h-def{background:#f5f5f5;color:#555}
.h-safety{background:#e8f5e9;color:#1b5e20}
.h-quality{background:#e3f2fd;color:#0d47a1}
.h-facility{background:#fff3e0;color:#bf360c}
.h-other{background:#f3e5f5;color:#4a148c}
.h-security{background:#fce4ec;color:#880e4f}
.h-art{background:#e0f2f1;color:#004d40}
.h-nature{background:#f1f8e9;color:#33691e}
.h-typhoon{background:#e8eaf6;color:#1a237e}
.field-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #f5f5f5}
.field-row:last-child{border-bottom:none}
.field-lbl{font-size:13px;color:var(--muted);min-width:82px;flex-shrink:0}
.field-inp{flex:1;border:none;border-bottom:1.5px solid var(--border);font-size:15px;font-family:inherit;color:var(--text);background:transparent;outline:none;padding:3px 0;min-width:0}
.field-inp:focus{border-bottom-color:var(--gold)}
.today-btn{background:var(--gold);border:none;border-radius:10px;padding:3px 9px;font-size:11px;font-weight:700;color:var(--navy);cursor:pointer;white-space:nowrap;flex-shrink:0}
.check-item{padding:11px 16px;border-bottom:1px solid #f5f5f5}
.check-item:last-child{border-bottom:none}
.check-lbl{font-size:14px;line-height:1.5;margin-bottom:8px;color:var(--text)}
.opts{display:flex;gap:7px;flex-wrap:wrap}
.opt{padding:8px 18px;border-radius:22px;border:2px solid var(--border);background:#f8f8f8;font-size:14px;font-weight:600;cursor:pointer;transition:all .12s;min-height:40px;font-family:inherit}
.opt:active{transform:scale(.94)}
.opt.sel-ok{background:var(--green);border-color:var(--green);color:#fff}
.opt.sel-ng{background:var(--red);border-color:var(--red);color:#fff}
.opt.sel-warn{background:var(--orange);border-color:var(--orange);color:#fff}
.note-lbl{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px}
.note-ta{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;resize:vertical;min-height:72px;outline:none;color:var(--text)}
.note-ta:focus{border-color:var(--gold)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:#f5f5f5;padding:7px 6px;text-align:center;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted)}
.tbl td{padding:7px 6px;border-bottom:1px solid #f5f5f5;text-align:center;vertical-align:middle}
.tiny-inp{width:62px;border:1.5px solid var(--border);border-radius:8px;padding:4px;font-size:13px;text-align:center;font-family:inherit;outline:none}
.tiny-inp:focus{border-color:var(--gold)}
.save-bar{background:var(--navy);color:rgba(255,255,255,.65);text-align:center;padding:14px;font-size:12px;position:fixed;bottom:0;left:0;right:0;z-index:98}
@media print{
  .form-header,.save-bar{display:none!important}
  #home-screen{display:none!important}
  #form-screen{display:block!important}
}
</style>
</head>
<body>

<div id="home-screen" class="screen active">
  <div class="home-header">
    <div class="home-title">天海の城</div>
    <div class="home-sub">日常運営管理表 — 研修・業務用アプリ</div>
  </div>
  <div class="home-grid">
    <div class="form-card" id="card-1" onclick="openForm(1)"><span class="card-num">様式1</span><span class="card-icon">🌅</span><span class="card-title">毎日開館前点検表</span><span class="card-dot" id="dot-1"></span></div>
    <div class="form-card" id="card-2" onclick="openForm(2)"><span class="card-num">様式2</span><span class="card-icon">🌙</span><span class="card-title">毎日閉館時点検表</span><span class="card-dot" id="dot-2"></span></div>
    <div class="form-card" id="card-3" onclick="openForm(3)"><span class="card-num">様式3</span><span class="card-icon">🛏</span><span class="card-title">客室最終点検表</span><span class="card-dot" id="dot-3"></span></div>
    <div class="form-card" id="card-4" onclick="openForm(4)"><span class="card-num">様式4</span><span class="card-icon">🎨</span><span class="card-title">美術館温湿度・展示品状態記録</span><span class="card-dot" id="dot-4"></span></div>
    <div class="form-card" id="card-5" onclick="openForm(5)"><span class="card-num">様式5</span><span class="card-icon">🌿</span><span class="card-title">植物管理記録表</span><span class="card-dot" id="dot-5"></span></div>
    <div class="form-card" id="card-6" onclick="openForm(6)"><span class="card-num">様式6</span><span class="card-icon">🔧</span><span class="card-title">修理申請・検収表</span><span class="card-dot" id="dot-6"></span></div>
    <div class="form-card" id="card-7" onclick="openForm(7)"><span class="card-num">様式7</span><span class="card-icon">👤</span><span class="card-title">顧客接遇登録表</span><span class="card-dot" id="dot-7"></span></div>
    <div class="form-card" id="card-8" onclick="openForm(8)"><span class="card-num">様式8</span><span class="card-icon">🎁</span><span class="card-title">無料接遇・割引承認表</span><span class="card-dot" id="dot-8"></span></div>
    <div class="form-card" id="card-9" onclick="openForm(9)"><span class="card-num">様式9</span><span class="card-icon">🌀</span><span class="card-title">台風防災点検表</span><span class="card-dot" id="dot-9"></span></div>
    <div class="form-card" id="card-10" onclick="openForm(10)"><span class="card-num">様式10</span><span class="card-icon">🚨</span><span class="card-title">事故・苦情・異常報告書</span><span class="card-dot" id="dot-10"></span></div>
  </div>
</div>

<div id="form-screen" class="screen">
  <div class="form-header">
    <button class="btn-back" onclick="goHome()">← ホーム</button>
    <div class="fh-title" id="fh-title"></div>
    <button class="btn-print" onclick="window.print()">🖨 印刷</button>
    <button class="btn-clear" onclick="clearForm()">🗑</button>
  </div>
  <div class="form-body" id="form-body"></div>
  <div class="save-bar" id="save-bar">入力内容は自動保存されます</div>
</div>

<script>
// --- State ---
var ST = {};
try { ST = JSON.parse(localStorage.getItem('tenkai_v3') || '{}'); } catch(e) {}

function save() {
  try { localStorage.setItem('tenkai_v3', JSON.stringify(ST)); } catch(e) {}
  var bar = document.getElementById('save-bar');
  if (bar) bar.textContent = '保存済み';
}

function gk(fid, fld) { return 'f' + fid + '_' + fld; }

// --- Navigation ---
var cFid = null;

function goHome() {
  document.getElementById('home-screen').classList.add('active');
  document.getElementById('form-screen').classList.remove('active');
  updateDots();
}

function openForm(id) {
  cFid = id;
  var titles = {1:'毎日開館前点検表',2:'毎日閉館時点検表',3:'客室最終点検表',4:'美術館温湿度・展示品状態記録',5:'植物管理記録表',6:'修理申請・検収表',7:'顧客接遇登録表',8:'無料接遇・割引承認表',9:'台風防災点検表',10:'事故・苦情・異常報告書'};
  document.getElementById('home-screen').classList.remove('active');
  document.getElementById('form-screen').classList.add('active');
  document.getElementById('fh-title').textContent = '様式' + id + '　' + (titles[id] || '');
  var fns = [null,form1,form2,form3,form4,form5,form6,form7,form8,form9,form10];
  document.getElementById('form-body').innerHTML = fns[id] ? fns[id](id) : '';
  restoreForm(id);
  window.scrollTo(0,0);
}

function clearForm() {
  if (!confirm('この様式の入力内容をすべてクリアしますか？')) return;
  var prefix = 'f' + cFid + '_';
  var keys = Object.keys(ST);
  for (var i = 0; i < keys.length; i++) {
    if (keys[i].indexOf(prefix) === 0) delete ST[keys[i]];
  }
  save();
  openForm(cFid);
}

// --- Colors ---
var OK_W = ['正常','良好','完了','はい','なし','撮影済','確認済','揃っている','実施済','不要','可能','可','異常なし','範囲内','実施','あり得る'];
var NG_W = ['異常','要改善','要対応','未完了','いいえ','あり','撮影不要','否認','補充必要','固定必要','是正後可能','必要','虫害あり','範囲外','未撮影','交換必要'];
var WN_W = ['要修正','確認中','該当なし','変更','普通','別途確認'];

function oc(v) {
  var i;
  for (i = 0; i < WN_W.length; i++) { if (WN_W[i] === v) return 'sel-warn'; }
  for (i = 0; i < NG_W.length; i++) { if (NG_W[i] === v) return 'sel-ng'; }
  return 'sel-ok';
}

// --- Button handlers ---
function selectOpt(el) {
  var key = el.getAttribute('data-key');
  var val = el.getAttribute('data-val');
  var btns = el.parentElement.querySelectorAll('.opt');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('sel-ok','sel-ng','sel-warn');
  el.classList.add(oc(val));
  ST[key] = val;
  save();
}

function toggleOpt(el) {
  var key = el.getAttribute('data-key');
  var val = el.getAttribute('data-val');
  if (ST[key]) { el.classList.remove('sel-ok','sel-ng','sel-warn'); delete ST[key]; }
  else { el.classList.add('sel-ok'); ST[key] = val; }
  save();
}

function onInp(el) { ST[el.getAttribute('data-key')] = el.value; save(); }

function setToday(key) {
  var d = new Date();
  var s = d.getFullYear() + '-' + (d.getMonth()<9?'0':'') + (d.getMonth()+1) + '-' + (d.getDate()<10?'0':'') + d.getDate();
  var el = document.querySelector('[data-key="' + key + '"]');
  if (el) { el.value = s; ST[key] = s; save(); }
}

// --- Restore ---
function restoreForm(id) {
  var prefix = 'f' + id + '_';
  var els = document.querySelectorAll('[data-key]');
  for (var i = 0; i < els.length; i++) {
    var el = els[i];
    var key = el.getAttribute('data-key');
    if (key.indexOf(prefix) !== 0) continue;
    var val = ST[key];
    if (!val) continue;
    var tn = el.tagName.toLowerCase();
    if (tn === 'input' || tn === 'textarea') el.value = val;
    else if (el.classList.contains('opt') && el.getAttribute('data-val') === val) el.classList.add(oc(val));
  }
}

// --- Dots ---
function isStarted(id) {
  var prefix = 'f' + id + '_';
  var keys = Object.keys(ST);
  for (var i = 0; i < keys.length; i++) if (keys[i].indexOf(prefix) === 0) return true;
  return false;
}

function updateDots() {
  for (var i = 1; i <= 10; i++) {
    var c = document.getElementById('card-' + i);
    if (c) { if (isStarted(i)) c.classList.add('started'); else c.classList.remove('started'); }
  }
}

// --- HTML builders ---
function mkOpts(fid, id, opts, style) {
  var key = gk(fid, id);
  var h = '<div class="opts">';
  for (var i = 0; i < opts.length; i++) {
    h += '<button class="opt" data-key="' + key + '" data-val="' + opts[i] + '" onclick="selectOpt(this)"' + (style ? ' style="' + style + '"' : '') + '>' + opts[i] + '</button>';
  }
  return h + '</div>';
}

function mkTog(fid, id, val, style) {
  return '<button class="opt" data-key="' + gk(fid,id+'_'+val) + '" data-val="' + val + '" onclick="toggleOpt(this)"' + (style ? ' style="' + style + '"' : '') + '>' + val + '</button>';
}

function mkFld(fid, id, label, type, ph) {
  var key = gk(fid, id);
  var inp;
  if (type === 'date') inp = '<input class="field-inp" type="date" data-key="' + key + '" oninput="onInp(this)"><button class="today-btn" onclick="setToday(\'' + key + '\')">今日</button>';
  else if (type === 'time') inp = '<input class="field-inp" type="time" data-key="' + key + '" oninput="onInp(this)">';
  else inp = '<input class="field-inp" type="text" placeholder="' + (ph||'') + '" data-key="' + key + '" oninput="onInp(this)">';
  return '<div class="field-row"><span class="field-lbl">' + label + '</span>' + inp + '</div>';
}

function mkTa(fid, id, label, rows) {
  return '<div class="fcard" style="padding:14px 16px"><label class="note-lbl">' + label + '</label><textarea class="note-ta" rows="' + (rows||3) + '" data-key="' + gk(fid,id) + '" oninput="onInp(this)" placeholder="記入してください"></textarea></div>';
}

function mkSig(fid, sigs) {
  var h = '<div class="fcard"><div class="fcard-head h-def">署名・確認</div>';
  for (var i = 0; i < sigs.length; i++) {
    h += '<div class="field-row"><span class="field-lbl">' + sigs[i] + '</span><input class="field-inp" type="text" data-key="' + gk(fid,'sig'+i) + '" oninput="onInp(this)" placeholder="署名"></div>';
  }
  return h + '</div>';
}

function mkSec(fid, label, cls, items) {
  var h = '<div class="fcard"><div class="fcard-head ' + cls + '">' + label + '</div>';
  for (var i = 0; i < items.length; i++) {
    h += '<div class="check-item"><div class="check-lbl">' + items[i].t + '</div>' + mkOpts(fid, items[i].id, items[i].o) + '</div>';
  }
  return h + '</div>';
}

function mkHdr(fid, fields) {
  var h = '<div class="fcard"><div class="fcard-head h-def">基本情報</div>';
  for (var i = 0; i < fields.length; i++) h += mkFld(fid, fields[i][0], fields[i][1], fields[i][2], fields[i][3]);
  return h + '</div>';
}

// ===== FORM 1 =====
function form1(fid) {
  var h = mkHdr(fid,[['date','日付','date'],['weather','天候','text','晴れ/曇り/雨'],['time','点検時間','time'],['checker','点検者','text'],['manager','当日責任者','text']]);
  h += mkSec(fid,'🔒 安全','h-safety',[
    {id:'q01',t:'正面玄関、裏口、通用口は正常か',o:['正常','異常']},
    {id:'q02',t:'各区域の扉・窓は正常か',o:['正常','異常']},
    {id:'q03',t:'厨房の火気、ガス、電源は正常か',o:['正常','異常']},
    {id:'q04',t:'給湯設備は正常か',o:['正常','異常']},
    {id:'q05',t:'漏水、漏電、異臭はないか',o:['なし','あり']},
    {id:'q06',t:'消防通路は確保されているか',o:['はい','いいえ']},
    {id:'q07',t:'浴場・浴室床面に滑りやすい箇所はないか',o:['正常','異常']}
  ]);
  h += mkSec(fid,'✨ 品質','h-quality',[
    {id:'q08',t:'共用部の清掃状態',o:['良好','要改善']},
    {id:'q09',t:'トイレの清掃および備品',o:['良好','補充必要']},
    {id:'q10',t:'照明、空調、香り、音楽',o:['正常','異常']},
    {id:'q11',t:'美術館展示状態',o:['正常','異常']}
  ]);
  h += mkSec(fid,'⚙ 設備','h-facility',[
    {id:'q12',t:'ネットワーク、プロジェクター、音響',o:['正常','異常']},
    {id:'q13',t:'除湿機および排水',o:['正常','異常']},
    {id:'q14',t:'会議設備',o:['正常','異常']}
  ]);
  h += mkSec(fid,'📝 その他','h-other',[
    {id:'q15',t:'当日の特記事項',o:['なし','あり']},
    {id:'q16',t:'写真記録',o:['撮影済','撮影不要']}
  ]);
  h += mkTa(fid,'urgent','直ちに対応すべき事項',3);
  h += mkSig(fid,['点検者署名','責任者確認']);
  return h;
}

// ===== FORM 2 =====
function form2(fid) {
  var h = mkHdr(fid,[['date','日付','date'],['close','閉館時間','time'],['checker','点検者','text'],['final','最終確認者','text']]);
  h += mkSec(fid,'🔐 施錠','h-security',[
    {id:'q01',t:'正面玄関、裏口、各通用口の施錠',o:['完了','異常']},
    {id:'q02',t:'客室ドアの施錠確認',o:['完了','異常']},
    {id:'q03',t:'美術館、事務室、倉庫の施錠',o:['完了','異常']}
  ]);
  h += mkSec(fid,'⚡ 電源','h-facility',[
    {id:'q04',t:'共用部電源の確認',o:['完了','異常']},
    {id:'q05',t:'厨房電源、ガス、火気確認',o:['完了','異常']}
  ]);
  h += mkSec(fid,'💧 空調・水回り','h-quality',[
    {id:'q06',t:'客室、共用部の空調確認',o:['完了','異常']},
    {id:'q07',t:'浴室、トイレ、厨房の漏水確認',o:['異常なし','異常あり']},
    {id:'q08',t:'除湿機の状態および排水確認',o:['完了','異常']}
  ]);
  h += mkSec(fid,'🏠 安全・防犯','h-safety',[
    {id:'q09',t:'防犯設備の設定',o:['完了','異常']},
    {id:'q10',t:'屋外家具・植木鉢・ゴミ箱・工具',o:['正常','固定必要']},
    {id:'q11',t:'台風・大雨・強風リスク',o:['なし','あり']},
    {id:'q12',t:'顧客の安全確認',o:['確認済','該当なし']},
    {id:'q13',t:'緊急連絡先確認',o:['はい','いいえ']}
  ]);
  h += mkTa(fid,'remaining','未完了事項',3);
  h += mkSig(fid,['点検者署名','最終確認者署名']);
  return h;
}

// ===== FORM 3 =====
function form3(fid) {

  h += mkSec(fid,'対応確認','h-other',[
    {id:'police',t:'警察・消防・救急への連絡',o:['あり','なし']},
    {id:'cust_exp',t:'顧客への説明',o:['済','未了','該当なし']},
    {id:'photo',t:'写真・動画記録',o:['あり','なし']},
    {id:'compensation',t:'賠償可能性',o:['あり得る','なし','確認中']},
    {id:'repair',t:'修理必要性',o:['あり','なし']},
    {id:'mgr',t:'管理者判断の要否',o:['必要','不要']}
  ]);
  var atbl = '<table class="tbl"><thead><tr><th style="text-align:left">対応事項</th><th>責任者</th><th>期限</th><th>完了</th></tr></thead><tbody>';
  for (var an = 1; an <= 3; an++) {
    atbl += '<tr><td><input class="field-inp" type="text" data-key="' + gk(fid,'act_t'+an) + '" oninput="onInp(this)" placeholder="対応事項" style="width:100%;min-width:80px"></td>';
    atbl += '<td><input class="tiny-inp" type="text" data-key="' + gk(fid,'act_r'+an) + '" oninput="onInp(this)" placeholder="担当" style="width:72px"></td>';
    atbl += '<td><input class="tiny-inp" type="date" data-key="' + gk(fid,'act_d'+an) + '" oninput="onInp(this)" style="width:120px"></td>';
    atbl += '<td>' + mkOpts(fid,'act_s'+an,['完了','未完了'],'padding:4px 10px;font-size:12px') + '</td></tr>';
  }
  atbl += '</tbody></table>';
  h += '<div class="fcard"><div class="fcard-head h-def">今後の対応計画</div><div style="overflow-x:auto;padding:10px">' + atbl + '</div></div>';
  h += mkTa(fid,'background','発生経緯',3);
  h += mkTa(fid,'cause','初期原因',2);
  h += mkTa(fid,'action_taken','実施済対応',2);
  h += mkTa(fid,'contact','連絡先・連絡相手',2);
  h += mkTa(fid,'prevent1','再発防止策①',2);
  h += mkTa(fid,'prevent2','再発防止策②',2);
  h += mkSig(fid,['支配人確認','会長／代表者確認']);
  return h;
}

// Init
updateDots();
</script>
